services:
  postgres:
    image: postgres:16-alpine
    container_name: ml_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_db}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ml_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: python:3.12-slim
    container_name: ml_mlflow
    command: >
      bash -c "pip install mlflow==2.19.0 psycopg2-binary==2.9.10 &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fraud_db}
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
