name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Test (pytest)
        run: uv run pytest tests/ -v --tb=short

  dbt:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dbt --extra dev

      - name: Generate synthetic data
        run: uv run python data/generate_synthetic.py

      - name: dbt deps
        run: cd dbt && uv run dbt deps --target duckdb

      - name: dbt seed
        run: cd dbt && uv run dbt seed --target duckdb

      - name: dbt build
        run: cd dbt && uv run dbt build --target duckdb

      - name: dbt test
        run: cd dbt && uv run dbt test --target duckdb

  parity:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Feature parity check
        run: uv run python -m ml_service.features.parity

  eval-gate:
    runs-on: ubuntu-latest
    needs: parity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run eval suite + gate
        run: uv run python -m eval.gate
